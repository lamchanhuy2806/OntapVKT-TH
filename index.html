<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vi Ký Sinh Trùng — Ôn Tập</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

<header>
  <div class="logo">Vi Ký Sinh Trùng <span>/ Ôn Tập</span></div>
  <div class="progress-wrap">
    <span class="score-badge" id="score-badge">0 đúng</span>
    <span class="progress-text" id="progress-text">0 / 0</span>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="card" id="main-card">
  <div class="loading" id="loading-msg">Đang tải câu hỏi...</div>

  <!-- Quiz content (hidden until loaded) -->
  <div id="quiz-content" style="display:none">
    <div class="card-top">
      <span class="badge" id="category-badge">—</span>
      <div class="attempt-dots">
        <div class="dot" id="dot-1"></div>
        <div class="dot" id="dot-2"></div>
      </div>
    </div>

    <div class="question-text" id="question-text">—</div>

    <div class="image-wrap" id="image-wrap">
      <img id="question-image" src="" alt="Hình ký sinh trùng">
      <div class="img-overlay"></div>
    </div>

    <div class="hint-text" id="hint-text"></div>

    <div class="input-area">
      <div class="input-label">Đáp án của bạn</div>
      <div class="input-row">
        <input
          type="text"
          class="answer-input"
          id="answer-input"
          placeholder="Nhập tên ký sinh trùng..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
        <button class="submit-btn" id="submit-btn" onclick="checkAnswer()">Kiểm tra</button>
      </div>
    </div>

    <div class="feedback-panel" id="feedback-panel">
      <div class="feedback-header">
        <span class="feedback-icon" id="feedback-icon"></span>
        <span class="feedback-title" id="feedback-title"></span>
      </div>
      <div class="correct-answer-line" id="correct-answer-line" style="display:none"></div>
      <div class="explanation-text" id="explanation-text" style="display:none"></div>
    </div>

    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <!-- Done screen -->
  <div class="done-screen" id="done-screen">
    <div class="done-number" id="done-score">0/0</div>
    <div class="done-label">Bạn đã hoàn thành bộ câu hỏi!</div>
    <button class="restart-btn" onclick="restartQuiz()">Làm lại từ đầu</button>
  </div>
</div>


<script src="js/main.js"></script>
</body>
</html>
