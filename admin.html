<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Quản Lý Câu Hỏi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Literata:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0b0f1a;
    --surface:  #111827;
    --surface2: #1a2235;
    --border:   #1f2e47;
    --border2:  #2a3f5f;
    --accent:   #3b82f6;
    --accent2:  #60a5fa;
    --green:    #22c55e;
    --red:      #ef4444;
    --amber:    #f59e0b;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --muted2:   #94a3b8;
    --mono:     'Space Mono', monospace;
    --serif:    'Literata', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--serif);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.2;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo { font-family: var(--mono); font-size: 13px; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; }
  .logo span { color: var(--muted); }

  .header-actions { display: flex; gap: 10px; }

  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    border: 1px solid transparent;
  }

  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #2563eb; }
  .btn-outline { background: transparent; color: var(--accent2); border-color: var(--border2); }
  .btn-outline:hover { border-color: var(--accent); }
  .btn-danger { background: transparent; color: var(--red); border-color: rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.08); }
  .btn-green { background: var(--green); color: #000; }
  .btn-green:hover { background: #16a34a; }

  /* Layout */
  .layout {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: start;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted2);
  }

  /* Form */
  .form-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .field { display: flex; flex-direction: column; gap: 6px; }

  .field-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .field-input, .field-select, .field-textarea {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .field-textarea {
    font-family: var(--serif);
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    min-height: 80px;
  }

  .field-input:focus, .field-select:focus, .field-textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }

  .field-select { cursor: pointer; }
  .field-select option { background: var(--surface2); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Image preview */
  .image-path-row { display: flex; gap: 8px; }
  .image-path-row .field-input { flex: 1; }

  .image-preview {
    margin-top: 8px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px dashed var(--border2);
    background: #0a1020;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .image-preview img {
    max-width: 100%;
    max-height: 180px;
    object-fit: contain;
  }

  .image-preview .placeholder-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 16px;
  }

  /* Form actions */
  .form-actions {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Question list */
  .q-list { padding: 0; list-style: none; }

  .q-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .q-item:last-child { border-bottom: none; }
  .q-item:hover { background: var(--surface2); }
  .q-item.active { background: rgba(59,130,246,0.08); border-left: 2px solid var(--accent); }

  .q-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
  }

  .q-info { flex: 1; min-width: 0; }

  .q-answer {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .q-cat {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: var(--serif);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .q-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .q-del:hover { color: var(--red); background: rgba(239,68,68,0.08); }

  /* Export section */
  .export-section {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 860px;
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    overflow: hidden;
  }

  .export-body { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }

  .export-info {
    font-family: var(--serif);
    font-size: 14px;
    color: var(--muted2);
  }

  .export-info strong { color: var(--text); font-weight: 600; }

  /* JSON preview */
  .json-box {
    background: #070a12;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted2);
    line-height: 1.7;
    white-space: pre-wrap;
    max-height: 200px;
    overflow-y: auto;
    margin: 0 20px 16px;
    display: none;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    padding: 12px 20px;
    background: var(--surface);
    border: 1px solid var(--green);
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--green);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .count-badge {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .empty-list {
    padding: 32px;
    text-align: center;
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--muted);
  }

  @media (max-width: 640px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Vi KST <span>/ Admin</span></div>
  <div class="header-actions">
    <a href="index.html" style="text-decoration:none"><button class="btn btn-outline">← Xem trang quiz</button></a>
    <button class="btn btn-green" onclick="exportJSON()">⬇ Export questions.json</button>
  </div>
</header>

<div class="layout">

  <!-- Form thêm/sửa câu hỏi -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title" id="form-title">Thêm câu hỏi mới</span>
      <button class="btn btn-outline" id="clear-btn" onclick="clearForm()" style="display:none">Hủy sửa</button>
    </div>
    <div class="form-body">

      <div class="field-row">
        <div class="field">
          <label class="field-label">ID câu hỏi</label>
          <input type="text" class="field-input" id="f-id" placeholder="q001" autocomplete="off">
        </div>
        <div class="field">
          <label class="field-label">Danh mục</label>
          <input type="text" class="field-input" id="f-category" placeholder="Đơn bào đường ruột" autocomplete="off">
        </div>
      </div>

      <div class="field">
        <label class="field-label">Câu hỏi hiển thị</label>
        <input type="text" class="field-input" id="f-question" placeholder="Đây là ký sinh trùng nào?" autocomplete="off">
      </div>

      <div class="field">
        <label class="field-label">Đáp án chính xác</label>
        <input type="text" class="field-input" id="f-answer" placeholder="Entamoeba histolytica" autocomplete="off">
      </div>

      <div class="field">
        <label class="field-label">Gợi ý (hiện sau lần sai 1)</label>
        <input type="text" class="field-input" id="f-hint" placeholder="Amip gây kiết lỵ..." autocomplete="off">
      </div>

      <div class="field">
        <label class="field-label">Đường dẫn hình ảnh</label>
        <div class="image-path-row">
          <input type="text" class="field-input" id="f-image" placeholder="images/parasite_001.jpg" oninput="previewImage(this.value)">
          <button class="btn btn-outline" onclick="document.getElementById('f-image').focus()">📁</button>
        </div>
        <div class="image-preview" id="image-preview">
          <div class="placeholder-text">Nhập đường dẫn ảnh để xem trước</div>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Giải thích (hiện sau khi sai quá 2 lần)</label>
        <textarea class="field-textarea" id="f-explanation" placeholder="Mô tả đặc điểm nhận dạng, vòng đời, bệnh gây ra..."></textarea>
      </div>

    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="clearForm()">Xóa form</button>
      <button class="btn btn-primary" onclick="saveQuestion()">Lưu câu hỏi</button>
    </div>
  </div>

  <!-- Danh sách câu hỏi -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">Danh sách</span>
      <span class="count-badge" id="count-badge">0 câu</span>
    </div>
    <ul class="q-list" id="q-list">
      <li class="empty-list">Chưa có câu hỏi nào</li>
    </ul>
  </div>

</div>

<!-- Export section -->
<div class="export-section">
  <div class="panel-header">
    <span class="panel-title">Export & Hướng dẫn</span>
    <button class="btn btn-outline" onclick="toggleJsonPreview()">Xem JSON</button>
  </div>
  <div class="export-body">
    <div class="export-info">
      Hiện có <strong id="export-count">0</strong> câu hỏi.
      Sau khi export, copy file <code style="font-family:var(--mono);font-size:12px;color:var(--accent2)">questions.json</code>
      vào thư mục <code style="font-family:var(--mono);font-size:12px;color:var(--accent2)">data/</code> rồi push lên GitHub.
    </div>
    <button class="btn btn-green" onclick="exportJSON()">⬇ Tải questions.json</button>
  </div>
  <pre class="json-box" id="json-preview"></pre>
</div>

<div class="toast" id="toast"></div>

<script>
let questions = [];
let editingId = null;

// Load existing questions.json on startup
async function loadExisting() {
  try {
    const res = await fetch('data/questions.json');
    if (res.ok) {
      questions = await res.json();
      renderList();
      showToast('Đã load ' + questions.length + ' câu hỏi từ questions.json');
    }
  } catch (e) {
    // No existing file — start fresh
  }
}

function generateId() {
  const nums = questions.map(q => {
    const m = q.id?.match(/\d+/);
    return m ? parseInt(m[0]) : 0;
  });
  const next = (Math.max(0, ...nums) + 1).toString().padStart(3, '0');
  return 'q' + next;
}

function saveQuestion() {
  const id       = document.getElementById('f-id').value.trim() || generateId();
  const category = document.getElementById('f-category').value.trim();
  const question = document.getElementById('f-question').value.trim();
  const answer   = document.getElementById('f-answer').value.trim();
  const hint     = document.getElementById('f-hint').value.trim();
  const image    = document.getElementById('f-image').value.trim();
  const explanation = document.getElementById('f-explanation').value.trim();

  if (!answer) { alert('Vui lòng nhập đáp án!'); return; }
  if (!image)  { alert('Vui lòng nhập đường dẫn hình ảnh!'); return; }

  const q = { id, category, image, question: question || 'Đây là ký sinh trùng nào?', answer, hint, explanation };

  if (editingId) {
    const idx = questions.findIndex(x => x.id === editingId);
    if (idx >= 0) questions[idx] = q;
    editingId = null;
  } else {
    // Check duplicate id
    if (questions.find(x => x.id === id)) {
      q.id = generateId();
    }
    questions.push(q);
  }

  renderList();
  clearForm();
  showToast('Đã lưu: ' + answer);
}

function editQuestion(id) {
  const q = questions.find(x => x.id === id);
  if (!q) return;
  editingId = id;

  document.getElementById('f-id').value          = q.id || '';
  document.getElementById('f-category').value    = q.category || '';
  document.getElementById('f-question').value    = q.question || '';
  document.getElementById('f-answer').value      = q.answer || '';
  document.getElementById('f-hint').value        = q.hint || '';
  document.getElementById('f-image').value       = q.image || '';
  document.getElementById('f-explanation').value = q.explanation || '';

  previewImage(q.image);

  document.getElementById('form-title').textContent = 'Đang sửa: ' + q.answer;
  document.getElementById('clear-btn').style.display = 'inline-block';

  document.getElementById('f-category').focus();
  window.scrollTo(0, 0);

  // Highlight active
  document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
}

function deleteQuestion(id, e) {
  e.stopPropagation();
  const q = questions.find(x => x.id === id);
  if (!confirm(`Xóa "${q?.answer}"?`)) return;
  questions = questions.filter(x => x.id !== id);
  if (editingId === id) clearForm();
  renderList();
  showToast('Đã xóa câu hỏi');
}

function clearForm() {
  editingId = null;
  ['f-id','f-category','f-question','f-answer','f-hint','f-image','f-explanation'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('image-preview').innerHTML = '<div class="placeholder-text">Nhập đường dẫn ảnh để xem trước</div>';
  document.getElementById('form-title').textContent = 'Thêm câu hỏi mới';
  document.getElementById('clear-btn').style.display = 'none';
  document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
  document.getElementById('f-id').value = generateId();
}

function previewImage(src) {
  const wrap = document.getElementById('image-preview');
  if (!src.trim()) {
    wrap.innerHTML = '<div class="placeholder-text">Nhập đường dẫn ảnh để xem trước</div>';
    return;
  }
  wrap.innerHTML = `<img src="${src}" onerror="this.parentElement.innerHTML='<div class=placeholder-text>Không tìm thấy ảnh</div>'" alt="preview">`;
}

function renderList() {
  const list = document.getElementById('q-list');
  document.getElementById('count-badge').textContent = questions.length + ' câu';
  document.getElementById('export-count').textContent = questions.length;

  if (questions.length === 0) {
    list.innerHTML = '<li class="empty-list">Chưa có câu hỏi nào</li>';
    return;
  }

  list.innerHTML = questions.map((q, i) => `
    <li class="q-item" data-id="${q.id}" onclick="editQuestion('${q.id}')">
      <span class="q-num">${String(i+1).padStart(2,'0')}</span>
      <div class="q-info">
        <div class="q-answer">${q.answer}</div>
        <div class="q-cat">${q.category || '—'}</div>
      </div>
      <button class="q-del" onclick="deleteQuestion('${q.id}', event)" title="Xóa">✕</button>
    </li>
  `).join('');
}

function exportJSON() {
  const json = JSON.stringify(questions, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'questions.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Đã tải questions.json — copy vào thư mục data/');
}

function toggleJsonPreview() {
  const box = document.getElementById('json-preview');
  if (box.style.display === 'none' || !box.style.display) {
    box.textContent = JSON.stringify(questions, null, 2);
    box.style.display = 'block';
  } else {
    box.style.display = 'none';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', () => {
  loadExisting();
  document.getElementById('f-id').value = generateId();
});
</script>
</body>
</html>
